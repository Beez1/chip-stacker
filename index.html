<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chip Stacker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--bg:#0c0e14;--card:#151820;--card2:#1a1d28;--bdr:#252a3a;--bdr2:#2d3350;--gold:#e2b93b;--green:#00d26a;--red:#ff4757;--blue:#3b82f6;--t1:#f0f2f5;--t2:#9ca3b4;--t3:#5a6178;--t4:#363d52;--f:'Inter',-apple-system,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--f);display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none;overflow-x:hidden}
.header{text-align:center;padding:16px 0 8px}
.logo{font-size:1.6em;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#e2b93b,#f5d77a 40%,#e2b93b 60%,#c49a2e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 12px rgba(226,185,59,.3))}
.tagline{color:var(--t3);font-size:.65em;letter-spacing:4px;text-transform:uppercase;margin-top:2px;font-weight:500}
.meta-bar{display:flex;align-items:center;gap:8px;margin:8px 0 12px;flex-wrap:wrap;justify-content:center}
.conn-pill{display:flex;align-items:center;gap:5px;font-size:.65em;padding:4px 10px;background:var(--card);border:1px solid var(--bdr);border-radius:20px;font-weight:500}
.conn-dot{width:6px;height:6px;border-radius:50%}
.conn-dot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.conn-dot.bad{background:var(--red);box-shadow:0 0 6px var(--red)}
.conn-dot.wait{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.conn-text{color:var(--t2)}
.room-pill{display:flex;align-items:center;gap:5px;font-size:.65em;padding:4px 10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:20px;cursor:pointer;transition:all .2s;font-weight:500;color:var(--blue)}
.room-pill:hover{background:rgba(59,130,246,.18)}
.room-pill svg{width:12px;height:12px;fill:currentColor}
.room-pill.copied{color:var(--green);border-color:rgba(0,210,106,.3);background:rgba(0,210,106,.08)}
.gw{display:flex;gap:12px;align-items:flex-start;justify-content:center;padding:0 8px;max-width:920px;width:100%}
.pn{background:var(--card);border-radius:12px;padding:14px;width:220px;border:1px solid var(--bdr);position:relative;overflow:hidden}
.pn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--bdr2),transparent)}
.pt{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--bdr)}
.pt h3{font-size:.7em;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.pt .badge{font-size:.6em;font-weight:600;color:var(--t3);background:var(--card2);padding:2px 8px;border-radius:10px;border:1px solid var(--bdr)}
.pot-box{text-align:center;padding:14px 10px;background:linear-gradient(135deg,rgba(255,71,87,.06),rgba(255,71,87,.02));border:1px solid rgba(255,71,87,.12);border-radius:10px;margin-bottom:10px}
.pot-label{font-size:.55em;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(255,71,87,.5);margin-bottom:4px}
.pot-val{font-size:2.2em;font-weight:900;color:var(--red);font-family:var(--m);letter-spacing:-1px;text-shadow:0 0 30px rgba(255,71,87,.25)}
.bal-box{text-align:center;padding:10px;background:rgba(226,185,59,.08);border:1px solid rgba(226,185,59,.1);border-radius:10px;margin-bottom:10px}
.bal-label{font-size:.5em;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(226,185,59,.45);margin-bottom:2px}
.bal-val{font-size:1.5em;font-weight:800;color:var(--gold);font-family:var(--m)}
.sr{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.72em}
.sr .l{color:var(--t3);font-weight:500}.sr .v{font-weight:700;font-family:var(--m);font-size:.95em}
.sr .v.pos{color:var(--green)}.sr .v.neg{color:var(--red)}
.pl{margin-top:8px}
.pc{display:flex;align-items:center;gap:8px;padding:6px 8px;margin-bottom:3px;border-radius:8px;font-size:.7em;background:var(--card2)}
.pa{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.7em;color:rgba(0,0,0,.7);flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.pn-name{flex:1;font-weight:600;color:var(--t2)}.pn-name.me{color:var(--gold)}
.pd{font-family:var(--m);color:var(--t3);font-size:.85em;font-weight:500}
.es{padding:6px 8px;margin-bottom:3px;font-size:.6em;color:var(--t4);border:1px dashed var(--bdr);border-radius:8px;text-align:center;font-weight:500}
.hs{margin-top:8px;padding-top:8px;border-top:1px solid var(--bdr);text-align:center;font-size:.6em;color:var(--t4);font-weight:500;letter-spacing:1px}
.ga{position:relative}
.cw{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--bdr);box-shadow:0 8px 40px rgba(0,0,0,.5);cursor:pointer;touch-action:manipulation;background:var(--bg)}
canvas{display:block}
.pop{position:absolute;top:32%;left:50%;transform:translate(-50%,-50%) scale(.5);font-size:2em;font-weight:900;pointer-events:none;opacity:0;z-index:10;white-space:nowrap;letter-spacing:1px;font-family:var(--f);text-shadow:0 4px 24px rgba(0,0,0,.9)}
.ev-label{position:absolute;top:16%;left:50%;transform:translateX(-50%);font-size:1.1em;font-weight:900;letter-spacing:4px;text-transform:uppercase;opacity:0;white-space:nowrap;font-family:var(--f);text-shadow:0 2px 20px rgba(0,0,0,.9);z-index:8;pointer-events:none}
.ctrls{display:flex;gap:8px;margin-top:10px;justify-content:center}
.dbtn{position:relative;background:linear-gradient(135deg,#ff4757,#e8293a);color:#fff;padding:14px 48px;font-size:1em;font-weight:800;border:none;border-radius:10px;cursor:pointer;font-family:var(--f);letter-spacing:.5px;transition:all .15s;touch-action:manipulation;overflow:hidden}
.dbtn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.12),transparent);border-radius:10px 10px 0 0;pointer-events:none}
.dbtn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 25px rgba(255,71,87,.4)}
.dbtn:active:not(:disabled){transform:translateY(0)}
.dbtn:disabled{background:var(--card2);color:var(--t4);cursor:not-allowed;transform:none;box-shadow:none}
.dbtn:disabled::before{display:none}
.dh{text-align:center;font-size:.55em;color:var(--t4);margin-top:6px;font-weight:500;letter-spacing:1px}
.kh{display:inline-block;padding:1px 6px;background:var(--card);border:1px solid var(--bdr);border-radius:4px;font-family:var(--m);font-size:.9em;margin:0 2px}
.feed{max-height:300px;overflow-y:auto;font-size:.62em;color:var(--t3);line-height:1.7;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;font-family:var(--m)}
.feed::-webkit-scrollbar{width:4px}.feed::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
.feed div{padding:2px 6px;border-radius:4px;margin-bottom:1px}
.feed div:first-child{background:var(--card2)}
.feed .w{color:var(--green);font-weight:600}.feed .j{color:var(--gold);font-weight:600}
.feed .d{color:var(--t3)}.feed .b{color:#ff8c42;font-weight:600}.feed .s{color:var(--gold);font-weight:500}
.feed .ev{color:var(--red);font-weight:700}
.pf{position:sticky;top:12px;align-self:flex-start}
@media(max-width:780px){.gw{flex-wrap:wrap}.pn{width:100%;max-width:420px}.pf{position:static}.ga{order:-1}}
</style>
</head>
<body>
<div class="header"><div class="logo">CHIP STACKER</div><div class="tagline">Stack &bull; Collapse &bull; Win</div></div>
<div class="meta-bar">
  <div class="conn-pill"><div class="conn-dot wait" id="cdot"></div><span class="conn-text" id="ctxt">Connecting</span></div>
  <div class="room-pill" id="roomlink" onclick="copyLink()"><svg viewBox="0 0 16 16"><path d="M4.715 6.542L3.343 7.914a3 3 0 104.243 4.243l1.828-1.829A3 3 0 008.586 5.5L8 6.086a1.002 1.002 0 00-.154.199 2 2 0 01.861 3.337L6.88 11.45a2 2 0 11-2.83-2.83l.793-.792a4.018 4.018 0 01-.128-1.287z"/><path d="M6.586 4.672A3 3 0 007.414 9.5l.775-.776a2 2 0 01-.861-3.337L9.12 3.56a2 2 0 112.83 2.83l-.793.792c.112.42.155.855.128 1.287l1.372-1.372a3 3 0 10-4.243-4.243L6.586 4.672z"/></svg><span id="rlabel">Loading...</span></div>
</div>
<div class="gw">
  <div class="pn">
    <div class="pt"><h3>Game Room</h3><span class="badge" id="pcount">0 / 6</span></div>
    <div class="pot-box"><div class="pot-label">Pot</div><div class="pot-val" id="pot">0p</div></div>
    <div class="bal-box"><div class="bal-label">Your Balance</div><div class="bal-val" id="bal">100p</div></div>
    <div class="sr"><span class="l">Profit / Loss</span><span class="v" id="pnl">+0p</span></div>
    <div class="pl" id="plist"></div>
    <div class="hs">House Edge: 1.5% &bull; Collected: <span id="ht">0.0</span>p</div>
  </div>
  <div class="ga">
    <div class="cw" id="cwrap">
      <canvas id="gc" width="420" height="680"></canvas>
      <div class="ev-label" id="evlabel"></div>
      <div class="pop" id="pop"></div>
    </div>
    <div class="ctrls"><button class="dbtn" id="dbtn">DROP 1p</button></div>
    <div class="dh"><span class="kh">Space</span> or <span class="kh">Click</span> to drop</div>
  </div>
  <div class="pn pf">
    <div class="pt"><h3>Live Feed</h3><span class="badge" style="color:var(--green)">LIVE</span></div>
    <div class="feed" id="log"></div>
  </div>
</div>

<script>
(function(){
var gc=document.getElementById('gc'),c=gc.getContext('2d');
var W=gc.width,H=gc.height,GY=H-44,CX=W/2,GRAV=.45,CW=64,CHH=15;

// State
var ws,myIdx=-1,myName='',roomId='',players=[],connected=false,pendingMyDrops=0;
var stack=[],inflights=[],fallers=[],sparks=[];
var shake=0,house=0,collapsed=false,pendingCollapse=null;
var screenFlash=0,screenFlashCol='#fff';
// Canvas event animations
var eventFx=null; // {type, t, dur, ...}
var ambientDots=[]; // ambient floating particles
for(var i=0;i<25;i++) ambientDots.push({x:Math.random()*420,y:Math.random()*680,vx:(Math.random()-.5)*.15,vy:-.1-Math.random()*.15,a:Math.random()*.3,sz:1+Math.random()*1.5});

var EVENT_META={
  bomb:{label:'BOMB DROP!',color:'#ff4757',logMsg:'A bomb obliterated the stack!'},
  lightning:{label:'LIGHTNING STRIKE!',color:'#f0c040',logMsg:'Lightning struck the stack!'},
  tsunami:{label:'TSUNAMI!',color:'#3b82f6',logMsg:'A massive wave swept everything away!'},
  cat:{label:'CAT ATTACK!',color:'#c084fc',logMsg:'A cat knocked over the stack!'},
  meteor:{label:'METEOR IMPACT!',color:'#ff6b35',logMsg:'A meteor crashed into the chips!'},
  ufo:{label:'UFO ABDUCTION!',color:'#00d26a',logMsg:'A UFO beam snatched the chips!'},
};

// Chip
function makeChip(cx,cy,pidx){return{x:cx,y:cy,vx:0,vy:0,ang:0,va:0,pidx:pidx,w:CW,h:CHH,op:1,sq:1,sqv:0,glow:0};}

// Particles
function mkS(px,py,vx,vy,col,life,sz,tp){return{x:px,y:py,vx:vx,vy:vy,col:col,life:life,ml:life,sz:sz,tp:tp};}
function upS(s){s.vy+=.1;s.x+=s.vx;s.y+=s.vy;s.vx*=.99;s.life--;}
function drS(s){
  var a=Math.max(0,s.life/s.ml);c.save();c.globalAlpha=a;
  if(s.tp==='s'){c.strokeStyle=s.col;c.lineWidth=s.sz;c.beginPath();c.moveTo(s.x,s.y);c.lineTo(s.x-s.vx*4,s.y-s.vy*4);c.stroke();}
  else if(s.tp==='g'){var g=c.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*1.5);g.addColorStop(0,s.col);g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(s.x-s.sz*2,s.y-s.sz*2,s.sz*4,s.sz*4);}
  else if(s.tp==='r'){c.fillStyle=s.col;c.fillRect(s.x-s.sz/2,s.y-s.sz/2,s.sz*a,s.sz*a);}
  c.restore();
}
function boom(px,py,col,n){
  for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=2+Math.random()*4;sparks.push(mkS(px,py,Math.cos(a)*sp,Math.sin(a)*sp-2,col,30+Math.random()*25,2+Math.random()*1.5,'s'));}
  for(var i=0;i<(n>>1);i++)sparks.push(mkS(px+(Math.random()-.5)*30,py,(Math.random()-.5)*.5,-.5-Math.random()*.5,'rgba(255,255,255,.15)',35+Math.random()*20,5+Math.random()*6,'g'));
}

// ===== CANVAS EVENT EFFECTS =====
function startEventFx(type,total){
  var mid=GY-total*CHH/2;
  eventFx={type:type,t:0,dur:210,mid:mid,total:total,data:{}};
  // Pre-generate data for deterministic drawing
  if(type==='lightning'){
    // Generate bolt path
    var pts=[{x:CX+(Math.random()-.5)*30,y:-10}];
    var py=pts[0].y;
    while(py<mid+40){py+=15+Math.random()*20;pts.push({x:CX+(Math.random()-.5)*80,y:py});}
    eventFx.data.bolt=pts;
    eventFx.data.branches=[];
    for(var i=2;i<pts.length;i+=2){
      var bp=[{x:pts[i].x,y:pts[i].y}];
      var bpy=pts[i].y;
      for(var j=0;j<3;j++){bpy+=10+Math.random()*15;bp.push({x:pts[i].x+(Math.random()-.5)*60,y:bpy});}
      eventFx.data.branches.push(bp);
    }
  }
  if(type==='meteor'){eventFx.data.sx=W*.8;eventFx.data.sy=-30;eventFx.data.ex=CX;eventFx.data.ey=mid;}
  if(type==='tsunami'){eventFx.dur=240;}
  if(type==='ufo'){eventFx.dur=260;}

  // Event-specific sparks
  spawnEventSparks(type,total,mid);
}

function spawnEventSparks(type,total,mid){
  var cs;
  switch(type){
    case'bomb':cs=['#ff4757','#ff6b6b','#ffa502','#fff'];
      for(var i=0;i<100;i++){var a=Math.random()*Math.PI*2,sp=4+Math.random()*10;sparks.push(mkS(CX,mid,Math.cos(a)*sp,Math.sin(a)*sp-5,cs[i%4],40+Math.random()*40,3+Math.random()*3,'s'));}
      for(var i=0;i<25;i++)sparks.push(mkS(CX+(Math.random()-.5)*60,mid+(Math.random()-.5)*40,(Math.random()-.5)*8,-2-Math.random()*6,'#444',50+Math.random()*30,4+Math.random()*5,'r'));
      break;
    case'lightning':cs=['#f0c040','#fff','#ffe066'];
      for(var i=0;i<60;i++){var a=Math.random()*Math.PI*2,sp=3+Math.random()*6;sparks.push(mkS(CX+(Math.random()-.5)*50,mid,Math.cos(a)*sp*.4,Math.sin(a)*sp,cs[i%3],25+Math.random()*20,1.5+Math.random()*1.5,'s'));}
      break;
    case'tsunami':cs=['#3b82f6','#60a5fa','#93c5fd','#fff'];
      for(var i=0;i<80;i++)sparks.push(mkS(-20,GY-Math.random()*total*CHH,6+Math.random()*8,(Math.random()-.5)*3,cs[i%4],50+Math.random()*40,3+Math.random()*3,'s'));
      break;
    case'cat':cs=['#a855f7','#c084fc','#e9d5ff'];
      for(var i=0;i<50;i++)sparks.push(mkS(W+10,mid+(Math.random()-.5)*80,-8-Math.random()*6,(Math.random()-.5)*5,cs[i%3],35+Math.random()*30,2.5+Math.random()*2,'s'));
      break;
    case'meteor':cs=['#ff6b35','#ff4757','#ffa502','#fff'];
      for(var i=0;i<60;i++){var a=Math.random()*Math.PI*2,sp=5+Math.random()*8;sparks.push(mkS(CX,mid,Math.cos(a)*sp,Math.sin(a)*sp-3,cs[i%4],35+Math.random()*35,2.5+Math.random()*2.5,'s'));}
      break;
    case'ufo':cs=['#00d26a','#34d399','#6ee7b7','#fff'];
      for(var i=0;i<50;i++)sparks.push(mkS(CX+(Math.random()-.5)*60,mid+(Math.random()-.5)*60,(Math.random()-.5)*2,-4-Math.random()*6,cs[i%4],35+Math.random()*30,2+Math.random()*2,'s'));
      break;
  }
}

function drawEventFx(){
  if(!eventFx)return;
  var fx=eventFx,p=fx.t/fx.dur; // 0→1
  c.save();

  switch(fx.type){
    case'bomb':
      // Shockwave ring
      if(p<.5){
        var rp=p/.5;
        var radius=rp*180;
        c.globalAlpha=(1-rp)*.6;
        c.strokeStyle='#ff4757';c.lineWidth=3-rp*2;
        c.beginPath();c.arc(CX,fx.mid,radius,0,Math.PI*2);c.stroke();
        // Inner glow
        var grd=c.createRadialGradient(CX,fx.mid,0,CX,fx.mid,radius);
        grd.addColorStop(0,'rgba(255,71,87,.15)');grd.addColorStop(1,'transparent');
        c.fillStyle=grd;c.fill();
      }
      // Second shockwave
      if(p>.15&&p<.65){
        var rp2=(p-.15)/.5;
        c.globalAlpha=(1-rp2)*.35;c.strokeStyle='#ffa502';c.lineWidth=2;
        c.beginPath();c.arc(CX,fx.mid,rp2*140,0,Math.PI*2);c.stroke();
      }
      break;

    case'lightning':
      // Draw bolt
      if(p<.4){
        var bp=Math.min(1,p/.15); // bolt appears in first 15%
        var bolt=fx.data.bolt;
        var drawN=Math.ceil(bolt.length*bp);
        // Glow pass
        c.globalAlpha=.4*(1-p/.4);c.strokeStyle='#ffe066';c.lineWidth=12;c.lineCap='round';
        c.beginPath();c.moveTo(bolt[0].x,bolt[0].y);
        for(var i=1;i<drawN;i++)c.lineTo(bolt[i].x,bolt[i].y);
        c.stroke();
        // Core
        c.globalAlpha=1*(1-p/.4);c.strokeStyle='#fff';c.lineWidth=3;
        c.beginPath();c.moveTo(bolt[0].x,bolt[0].y);
        for(var i=1;i<drawN;i++)c.lineTo(bolt[i].x,bolt[i].y);
        c.stroke();
        // Branches
        if(bp>.5){
          c.globalAlpha=.6*(1-p/.4);c.strokeStyle='#f0c040';c.lineWidth=1.5;
          var br=fx.data.branches;
          for(var b=0;b<br.length;b++){
            c.beginPath();c.moveTo(br[b][0].x,br[b][0].y);
            for(var j=1;j<br[b].length;j++)c.lineTo(br[b][j].x,br[b][j].y);
            c.stroke();
          }
        }
        // Full screen flash at start
        if(p<.06){c.globalAlpha=.5*(1-p/.06);c.fillStyle='#fff';c.fillRect(0,0,W,H);}
      }
      break;

    case'tsunami':
      // Animated wave shape
      var waveX=-60+p*W*1.5;
      if(p<.7){
        c.globalAlpha=.7*(p<.5?1:(1-(p-.5)/.2));
        c.fillStyle='rgba(59,130,246,.25)';
        c.beginPath();c.moveTo(waveX-80,H);
        for(var y=0;y<=H;y+=5){
          var wx=waveX+Math.sin(y*.03+p*15)*20-y*.15;
          c.lineTo(wx,y);
        }
        c.lineTo(-80,H);c.closePath();c.fill();
        // Wave crest highlight
        c.strokeStyle='rgba(147,197,253,.5)';c.lineWidth=2;
        c.beginPath();
        for(var y=0;y<=H;y+=5){
          var wx2=waveX+Math.sin(y*.03+p*15)*20-y*.15;
          if(y===0)c.moveTo(wx2,y);else c.lineTo(wx2,y);
        }
        c.stroke();
        // Spray droplets at crest
        c.fillStyle='rgba(219,234,254,.6)';
        for(var i=0;i<5;i++){
          var dy=Math.random()*H,dx=waveX+Math.sin(dy*.03+p*15)*20-dy*.15;
          c.beginPath();c.arc(dx-5-Math.random()*15,dy,1+Math.random()*2,0,Math.PI*2);c.fill();
        }
      }
      break;

    case'cat':
      // Claw scratch marks
      if(p<.6){
        var cp=Math.min(1,p/.2);
        c.globalAlpha=.8*(p<.3?1:(1-(p-.3)/.3));
        c.strokeStyle='rgba(192,132,252,.7)';c.lineWidth=3;c.lineCap='round';
        // 3 claw lines
        for(var cl=0;cl<3;cl++){
          var sy=fx.mid-40+cl*35;
          var ex=W*.3+cp*(W*.5);
          c.beginPath();
          c.moveTo(W*.85,sy-10+cl*5);
          c.quadraticCurveTo(W*.6,sy+10*Math.sin(cl*2),W*.85-cp*(W*.55),sy+15-cl*8);
          c.stroke();
        }
        // Glow
        c.strokeStyle='rgba(168,85,247,.3)';c.lineWidth=10;
        for(var cl=0;cl<3;cl++){
          var sy=fx.mid-40+cl*35;
          c.beginPath();
          c.moveTo(W*.85,sy-10+cl*5);
          c.quadraticCurveTo(W*.6,sy+10*Math.sin(cl*2),W*.85-cp*(W*.55),sy+15-cl*8);
          c.stroke();
        }
      }
      break;

    case'meteor':
      // Meteor trail
      var d=fx.data;
      if(p<.4){
        var mp=p/.4;
        var mx=d.sx+(d.ex-d.sx)*mp,my=d.sy+(d.ey-d.sy)*mp;
        // Trail
        c.globalAlpha=.8;
        var tg=c.createLinearGradient(d.sx,d.sy,mx,my);
        tg.addColorStop(0,'transparent');tg.addColorStop(.6,'rgba(255,107,53,.4)');tg.addColorStop(1,'#ff6b35');
        c.strokeStyle=tg;c.lineWidth=6;c.lineCap='round';
        c.beginPath();c.moveTo(d.sx,d.sy);c.lineTo(mx,my);c.stroke();
        // Glow head
        var hg=c.createRadialGradient(mx,my,0,mx,my,25);
        hg.addColorStop(0,'rgba(255,255,255,.9)');hg.addColorStop(.3,'rgba(255,107,53,.6)');hg.addColorStop(1,'transparent');
        c.fillStyle=hg;c.beginPath();c.arc(mx,my,25,0,Math.PI*2);c.fill();
      }
      // Impact ring
      if(p>=.35&&p<.7){
        var ip=(p-.35)/.35;
        c.globalAlpha=(1-ip)*.7;
        c.strokeStyle='#ff6b35';c.lineWidth=4-ip*3;
        c.beginPath();c.arc(d.ex,d.ey,ip*160,0,Math.PI*2);c.stroke();
        var ig=c.createRadialGradient(d.ex,d.ey,0,d.ex,d.ey,ip*120);
        ig.addColorStop(0,'rgba(255,107,53,.2)');ig.addColorStop(1,'transparent');
        c.fillStyle=ig;c.fillRect(d.ex-160,d.ey-160,320,320);
      }
      break;

    case'ufo':
      // Tractor beam cone
      var beamAlpha=p<.2?p/.2:p>.7?(1-(p-.7)/.3):1;
      c.globalAlpha=beamAlpha*.5;
      // Beam cone
      var bw1=10,bw2=70,bTop=30,bBot=fx.mid+60;
      var grad=c.createLinearGradient(CX,bTop,CX,bBot);
      grad.addColorStop(0,'rgba(0,210,106,.6)');grad.addColorStop(.5,'rgba(52,211,153,.3)');grad.addColorStop(1,'rgba(0,210,106,.05)');
      c.fillStyle=grad;
      c.beginPath();c.moveTo(CX-bw1,bTop);c.lineTo(CX+bw1,bTop);c.lineTo(CX+bw2,bBot);c.lineTo(CX-bw2,bBot);c.closePath();c.fill();
      // Beam rings
      c.strokeStyle='rgba(110,231,183,.3)';c.lineWidth=1;
      for(var r=0;r<5;r++){
        var ry=bTop+(bBot-bTop)*((r*.2+p*.5)%1);
        var rw=bw1+(bw2-bw1)*((ry-bTop)/(bBot-bTop));
        c.globalAlpha=beamAlpha*.3;
        c.beginPath();c.ellipse(CX,ry,rw,4,0,0,Math.PI*2);c.stroke();
      }
      // UFO body
      c.globalAlpha=beamAlpha*.9;
      c.fillStyle='#1a2a3a';
      c.beginPath();c.ellipse(CX,bTop-8,30,8,0,0,Math.PI*2);c.fill();
      c.fillStyle='#2a4a6a';
      c.beginPath();c.ellipse(CX,bTop-12,18,6,0,0,Math.PI*2);c.fill();
      // Lights
      c.fillStyle='rgba(0,210,106,'+(0.5+Math.sin(fx.t*.3)*.5)+')';
      for(var li=0;li<5;li++){
        var la=li/5*Math.PI*2+fx.t*.1;
        c.beginPath();c.arc(CX+Math.cos(la)*24,bTop-8+Math.sin(la)*5,2,0,Math.PI*2);c.fill();
      }
      break;
  }
  c.restore();
}

function updateEventFx(){
  if(!eventFx)return;
  eventFx.t++;
  if(eventFx.t>=eventFx.dur)eventFx=null;
}

function playEventLabel(type){
  var meta=EVENT_META[type];if(!meta)return;
  var el=document.getElementById('evlabel');
  el.textContent=meta.label;el.style.color=meta.color;
  gsap.killTweensOf(el);
  gsap.fromTo(el,{opacity:0,scale:.6,y:10},{opacity:1,scale:1,y:0,duration:.5,ease:'back.out(2)',
    onComplete:function(){gsap.to(el,{opacity:0,y:-20,duration:.7,delay:2.2,ease:'power2.in'});}});
  gsap.to('#cwrap',{x:function(){return(Math.random()-.5)*10;},y:function(){return(Math.random()-.5)*6;},duration:.05,repeat:10,yoyo:true,ease:'none',onComplete:function(){gsap.set('#cwrap',{x:0,y:0});}});
  gsap.fromTo('#pot',{scale:1},{scale:1.15,duration:.12,yoyo:true,repeat:3,ease:'power2.inOut'});
}

// Stack
function stackTopY(){var n=stack.length+inflights.length;return n===0?GY:GY-n*CHH;}
function launchChip(pidx,ox){if(pidx>=players.length)return;var ch=makeChip(CX+ox,-30,pidx);ch.vy=5;ch.vx=0;ch.targetStackIdx=stack.length+inflights.length;inflights.push(ch);}
function chipLands(ch,idx){
  inflights.splice(idx,1);ch.y=GY-(stack.length+1)*CHH;ch.vy=0;ch.vx=0;ch.sq=.5;ch.sqv=.12;ch.glow=1;stack.push(ch);
  boom(ch.x,ch.y+ch.h,pidxCol(ch.pidx),10);
  var f=1.5+Math.random()*.5;for(var i=0;i<stack.length-1;i++){stack[i].vx+=(Math.random()-.5)*f;stack[i].va+=(Math.random()-.5)*.015;stack[i].sq=.87+Math.random()*.1;stack[i].sqv=.025;}
  shake=6;
  if(pendingCollapse&&inflights.length===0){var pc=pendingCollapse;pendingCollapse=null;doCollapseVisual(pc.winnerIdx,pc.winnerName,pc.total,pc.net,pc.event);}
}

function doCollapseVisual(winnerIdx,winnerName,total,net,event){
  collapsed=true;
  for(var i=0;i<stack.length;i++){
    var ch=stack[i];
    switch(event){
      case'tsunami':ch.vx=6+Math.random()*8;ch.vy=-(1+Math.random()*4);break;
      case'cat':ch.vx=-(5+Math.random()*8);ch.vy=-(2+Math.random()*5);break;
      case'ufo':ch.vx=(Math.random()-.5)*3;ch.vy=-(8+Math.random()*8);break;
      case'meteor':ch.vx=(Math.random()-.5)*10;ch.vy=2+Math.random()*5;break;
      default:ch.vx=(Math.random()-.5)*14;ch.vy=-(4+Math.random()*7);
    }
    ch.va=(Math.random()-.5)*.3;ch.glow=1;ch.fadeTimer=120+Math.floor(Math.random()*60);fallers.push(ch);
  }
  stack=[];inflights=[];shake=25;
  screenFlash=1;screenFlashCol=EVENT_META[event]?EVENT_META[event].color:'#fff';
  startEventFx(event,total);
  playEventLabel(event);
  if(EVENT_META[event])addLog(EVENT_META[event].logMsg,'ev');
  if(winnerIdx===myIdx){setTimeout(function(){showPop('YOU WIN '+net.toFixed(1)+'p!','#e2b93b');},1800);addLog('COLLAPSE! You win '+net.toFixed(1)+'p from '+total+' chips!','j');}
  else{setTimeout(function(){showPop(winnerName+' WINS '+net.toFixed(1)+'p!','#ff8c42');},1800);addLog('COLLAPSE! '+winnerName+' takes '+net.toFixed(1)+'p ('+total+' chips)','b');}
  updUI();
}

function pidxCol(p){return(p<players.length)?players[p].col:'#888';}
function showPop(txt,col){var p=document.getElementById('pop');p.textContent=txt;p.style.color=col;gsap.killTweensOf(p);gsap.fromTo(p,{opacity:0,y:0,scale:.5},{opacity:1,y:-40,scale:1,duration:.5,ease:'back.out(2)',onComplete:function(){gsap.to(p,{opacity:0,y:-70,duration:.6,delay:1.2,ease:'power2.in'});}});}

// Drop
function myDrop(){
  if(!connected||collapsed||myIdx===-1)return;if(players[myIdx]&&players[myIdx].bal<1){addLog("You're broke!",'s');return;}
  var ox=(Math.random()-.5)*22;launchChip(myIdx,ox);players[myIdx].bal-=1;players[myIdx].drops++;
  addLog(players[myIdx].name+' dropped 1p','d');updUI();
  ws.send(JSON.stringify({type:'drop',ox:ox}));pendingMyDrops++;
}

// WS
function connect(){
  var proto=location.protocol==='https:'?'wss:':'ws:',room=new URLSearchParams(location.search).get('room')||'';
  ws=new WebSocket(proto+'//'+location.host+'/?room='+room);
  ws.onopen=function(){connected=true;setConn('ok','Connected');};
  ws.onclose=function(){connected=false;setConn('bad','Disconnected');};
  ws.onerror=function(){setConn('bad','Error');};
  ws.onmessage=function(e){var msg;try{msg=JSON.parse(e.data);}catch(er){return;}handleMsg(msg);};
}
function handleMsg(msg){
  switch(msg.type){
    case'welcome':roomId=msg.roomId;myIdx=msg.yourIdx;myName=msg.yourName;if(history.replaceState)history.replaceState(null,'','?room='+roomId);document.getElementById('rlabel').textContent=roomId+' \u2014 copy link';addLog('You joined as '+myName,'s');break;
    case'state':players=msg.players;house=msg.house;for(var i=0;i<players.length;i++){if(players[i].isYou){myIdx=i;break;}}if(inflights.length===0&&!collapsed)syncStack(msg.stack);collapsed=msg.collapsed;pendingMyDrops=0;updUI();break;
    case'drop':if(msg.pidx===myIdx&&pendingMyDrops>0){pendingMyDrops--;if(msg.pidx<players.length)players[msg.pidx].bal=msg.bal;}else{addLog(msg.name+' dropped 1p','d');launchChip(msg.pidx,msg.ox);if(msg.pidx<players.length){players[msg.pidx].drops++;players[msg.pidx].bal=msg.bal;}}updUI();break;
    case'collapse':house=msg.house;if(msg.balances){for(var i=0;i<msg.balances.length&&i<players.length;i++)players[i].bal=msg.balances[i];}pendingMyDrops=0;var ev={winnerIdx:msg.winnerIdx,winnerName:msg.winnerName,total:msg.total,net:msg.net,event:msg.event||'bomb'};if(inflights.length>0)pendingCollapse=ev;else doCollapseVisual(ev.winnerIdx,ev.winnerName,ev.total,ev.net,ev.event);updUI();break;
    case'newRound':setTimeout(function(){collapsed=false;addLog('--- Round '+msg.roundNum+' ---','s');updUI();},3500);break;
    case'playerJoined':addLog(msg.name+' joined ('+msg.playerCount+'/6)','s');break;
    case'playerLeft':addLog(msg.name+' left ('+msg.playerCount+'/6)','s');break;
    case'error':addLog('Error: '+msg.msg,'b');setConn('bad',msg.msg);break;
  }
}
function syncStack(ss){while(stack.length>ss.length)stack.pop();while(stack.length<ss.length){var idx=stack.length;var ch=makeChip(CX,GY-(idx+1)*CHH,ss[idx].pidx);ch.sq=1;ch.glow=0;stack.push(ch);}for(var i=0;i<stack.length;i++)stack[i].pidx=ss[i].pidx;}
function setConn(cls,txt){document.getElementById('cdot').className='conn-dot '+cls;document.getElementById('ctxt').textContent=txt;}
function copyLink(){var url=location.origin+'/?room='+roomId;if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){var el=document.getElementById('roomlink'),lb=document.getElementById('rlabel');el.classList.add('copied');lb.textContent='Link copied!';setTimeout(function(){el.classList.remove('copied');lb.textContent=roomId+' \u2014 copy link';},2000);});}}

// Physics
function physics(){
  for(var i=inflights.length-1;i>=0;i--){var ch=inflights[i];ch.vy+=GRAV;ch.x+=ch.vx;ch.y+=ch.vy;if(ch.y>=GY-(stack.length+1)*CHH){ch.y=GY-(stack.length+1)*CHH;chipLands(ch,i);}}
  for(var i=0;i<stack.length;i++){var s=stack[i];s.sqv+=(1-s.sq)*.15;s.sqv*=.65;s.sq+=s.sqv;s.glow*=.92;s.vx*=.84;s.x+=s.vx;s.ang+=s.va;s.va*=.86;s.ang*=.9;var dr=s.x-CX;if(Math.abs(dr)>18)s.vx-=dr*.02;s.y+=(GY-(i+1)*CHH-s.y)*.3;}
  for(var i=fallers.length-1;i>=0;i--){var f=fallers[i];f.vy+=GRAV*.7;f.x+=f.vx;f.y+=f.vy;f.ang+=f.va;f.sqv+=(1-f.sq)*.1;f.sqv*=.6;f.sq+=f.sqv;if(f.x<15){f.x=15;f.vx*=-.5;}if(f.x>W-15){f.x=W-15;f.vx*=-.5;}if(f.y>GY-f.h/2){f.y=GY-f.h/2;f.vy*=-.3;f.vx*=.6;f.va*=.4;f.sq=.6;f.sqv=.05;if(Math.abs(f.vy)<.8)f.vy=0;}if(f.fadeTimer!==undefined){f.fadeTimer--;if(f.fadeTimer<=0)f.op-=.03;}if(f.x<-30||f.x>W+30||f.y<-50||f.y>H+30)f.op-=.06;if(f.op<=0)fallers.splice(i,1);}
  for(var i=sparks.length-1;i>=0;i--){upS(sparks[i]);if(sparks[i].life<=0)sparks.splice(i,1);}
  if(sparks.length>300)sparks.splice(0,sparks.length-300);
  updateEventFx();
  if(screenFlash>0){screenFlash*=.95;if(screenFlash<.01)screenFlash=0;}
  if(shake>0){shake*=.8;if(shake<.15)shake=0;}
  // Ambient dots
  for(var i=0;i<ambientDots.length;i++){var d=ambientDots[i];d.x+=d.vx;d.y+=d.vy;if(d.y<-5){d.y=H+5;d.x=Math.random()*W;}if(d.x<-5||d.x>W+5)d.x=Math.random()*W;}
}

// Draw chip
function drawChip(ch,ox,oy,ang,opacity){
  var hw=ch.w/2,hh=ch.h/2,col=pidxCol(ch.pidx),sq=ch.sq||1;
  c.save();c.globalAlpha=opacity!==undefined?opacity:1;
  c.translate(ox,oy+hh);if(ang)c.rotate(ang);c.scale(1+(1-sq)*.5,sq);
  var dp=Math.max(4,ch.h*.4),c1=col,c2=lighten(col,35),c3=darken(col,45);
  if(ch.glow>.05){c.fillStyle=col+'44';c.beginPath();c.ellipse(0,hh,hw*1.3,dp*2,0,0,Math.PI*2);c.fill();}
  c.fillStyle='rgba(0,0,0,.25)';c.beginPath();c.ellipse(3,hh+5,hw*.85,dp*.4,0,0,Math.PI*2);c.fill();
  for(var dy=dp;dy>=0;dy-=2){c.fillStyle=lerpC(c3,c1,dy/dp);c.beginPath();c.ellipse(0,hh-dy*.6,hw,hh*.6,0,0,Math.PI*2);c.fill();}
  var tg=c.createRadialGradient(-hw*.3,-hh*.3,0,0,0,hw);tg.addColorStop(0,lighten(c2,30));tg.addColorStop(.5,c1);tg.addColorStop(1,darken(c1,20));
  c.fillStyle=tg;c.beginPath();c.ellipse(0,-hh*.15,hw,hh*.75,0,0,Math.PI*2);c.fill();
  c.strokeStyle='rgba(255,255,255,.12)';c.lineWidth=1;c.beginPath();c.ellipse(0,-hh*.15,hw*.6,hh*.45,0,0,Math.PI*2);c.stroke();
  var sg=c.createRadialGradient(-hw*.25,-hh*.5,0,-hw*.15,-hh*.3,hw*.5);sg.addColorStop(0,'rgba(255,255,255,.28)');sg.addColorStop(.6,'rgba(255,255,255,.04)');sg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=sg;c.beginPath();c.ellipse(0,-hh*.15,hw,hh*.75,0,0,Math.PI*2);c.fill();
  c.fillStyle='rgba(255,255,255,.85)';c.font='bold 9px Inter,sans-serif';c.textAlign='center';c.textBaseline='middle';c.shadowColor='rgba(0,0,0,.5)';c.shadowBlur=2;c.fillText('1p',0,-hh*.15);c.shadowBlur=0;
  c.restore();
}

// Scene
function drawScene(){
  var bg=c.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0a0c12');bg.addColorStop(.5,'#0e1018');bg.addColorStop(1,'#0c0e16');
  c.fillStyle=bg;c.fillRect(0,0,W,H);
  // Ambient floating dots
  c.fillStyle='rgba(255,255,255,.03)';
  for(var i=0;i<ambientDots.length;i++){var d=ambientDots[i];c.globalAlpha=d.a;c.beginPath();c.arc(d.x,d.y,d.sz,0,Math.PI*2);c.fill();}
  c.globalAlpha=1;
  // Subtle grid
  c.strokeStyle='rgba(255,255,255,.012)';c.lineWidth=1;
  for(var x=0;x<W;x+=40){c.beginPath();c.moveTo(x,0);c.lineTo(x,H);c.stroke();}
  for(var y=0;y<H;y+=40){c.beginPath();c.moveTo(0,y);c.lineTo(W,y);c.stroke();}
  // Vignette
  var vg=c.createRadialGradient(CX,H/2,H*.15,CX,H/2,H*.7);vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.5)');c.fillStyle=vg;c.fillRect(0,0,W,H);
  // Platform glow (intensifies with stack height)
  var pw=140,pl=CX-pw/2,pr=CX+pw/2;
  var glowI=Math.min(1,stack.length/15);
  var ug=c.createRadialGradient(CX,GY+5,0,CX,GY+5,pw*(.5+glowI*.3));
  ug.addColorStop(0,'rgba(59,130,246,'+(0.04+glowI*.08)+')');ug.addColorStop(1,'transparent');
  c.fillStyle=ug;c.fillRect(pl-80,GY-20,pw+160,50);
  // Platform
  var pg=c.createLinearGradient(pl,GY,pl,GY+16);pg.addColorStop(0,'#2a4a6e');pg.addColorStop(.3,'#1e3a58');pg.addColorStop(1,'#142840');
  c.fillStyle=pg;c.beginPath();c.moveTo(pl-6,GY);c.lineTo(pr+6,GY);c.lineTo(pr,GY+12);c.lineTo(pl,GY+12);c.closePath();c.fill();
  c.fillStyle='rgba(59,130,246,'+(0.12+glowI*.1)+')';c.fillRect(pl-4,GY,pw+8,1.5);
  c.fillStyle='#0e1e30';c.fillRect(pl+8,GY+10,6,18);c.fillRect(pr-14,GY+10,6,18);
}

function render(){
  c.save();
  if(shake>0)c.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);
  drawScene();
  if(screenFlash>.01){c.save();c.globalAlpha=screenFlash*.3;c.fillStyle=screenFlashCol;c.fillRect(0,0,W,H);c.restore();}
  for(var i=0;i<sparks.length;i++)if(sparks[i].tp==='g')drS(sparks[i]);
  // Event FX behind chips
  drawEventFx();
  for(var i=0;i<fallers.length;i++)drawChip(fallers[i],fallers[i].x,fallers[i].y,fallers[i].ang,fallers[i].op);
  for(var i=0;i<stack.length;i++)drawChip(stack[i],stack[i].x,stack[i].y,stack[i].ang);
  for(var i=0;i<inflights.length;i++)drawChip(inflights[i],inflights[i].x,inflights[i].y,0);
  for(var i=0;i<sparks.length;i++)if(sparks[i].tp!=='g')drS(sparks[i]);
  // Pot label
  var total=stack.length+inflights.length;
  if(total>0){var topY=GY-total*CHH;c.fillStyle='rgba(255,255,255,.25)';c.font='700 13px Inter,sans-serif';c.textAlign='left';c.fillText(total+'p',CX+CW/2+14,topY+CHH/2+4);}
  c.restore();
}

// Helpers
function parseC(s){if(s[0]==='#')return[parseInt(s.slice(1,3),16),parseInt(s.slice(3,5),16),parseInt(s.slice(5,7),16)];var m=s.match(/(\d+)/g);return m?[+m[0],+m[1],+m[2]]:[128,128,128];}
function lighten(co,a){var p=parseC(co);return'rgb('+Math.min(255,p[0]+a)+','+Math.min(255,p[1]+a)+','+Math.min(255,p[2]+a)+')';}
function darken(co,a){var p=parseC(co);return'rgb('+Math.max(0,p[0]-a)+','+Math.max(0,p[1]-a)+','+Math.max(0,p[2]-a)+')';}
function lerpC(h1,h2,t){var a=parseC(h1),b=parseC(h2);return'rgb('+Math.round(a[0]+(b[0]-a[0])*t)+','+Math.round(a[1]+(b[1]-a[1])*t)+','+Math.round(a[2]+(b[2]-a[2])*t)+')';}

function loop(){physics();render();requestAnimationFrame(loop);}

// UI
var lastPH='';
function updUI(){
  var total=stack.length+inflights.length;document.getElementById('pot').textContent=total+'p';
  var myP=(myIdx>=0&&myIdx<players.length)?players[myIdx]:null,bal=myP?myP.bal:100;
  document.getElementById('bal').textContent=Math.round(bal)+'p';
  var pnl=bal-100,pe=document.getElementById('pnl');
  pe.textContent=(pnl>=0?'+':'')+Math.round(pnl)+'p';pe.className='v '+(pnl>=0?'pos':'neg');
  document.getElementById('ht').textContent=house.toFixed(1);
  document.getElementById('pcount').textContent=players.length+' / 6';
  var h='';
  for(var i=0;i<players.length;i++){var p=players[i];h+='<div class="pc"><div class="pa" style="background:'+p.col+'">'+p.name.charAt(0)+'</div><span class="pn-name'+(p.isYou?' me':'')+'">'+p.name+(p.isYou?' (you)':'')+'</span><span class="pd">'+p.drops+'</span></div>';}
  for(var i=players.length;i<6;i++)h+='<div class="es">Waiting for player...</div>';
  if(h!==lastPH){document.getElementById('plist').innerHTML=h;lastPH=h;}
  var btn=document.getElementById('dbtn');btn.disabled=!connected||collapsed||!myP||myP.bal<1;
  btn.textContent=!connected?'CONNECTING...':!myP?'JOINING...':myP.bal<1?'BROKE':'DROP 1p';
}
function addLog(msg,cls){var el=document.getElementById('log'),d=document.createElement('div');d.className=cls;d.textContent='['+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'] '+msg;el.prepend(d);while(el.children.length>80)el.removeChild(el.lastChild);}

// Events
document.getElementById('dbtn').addEventListener('click',function(){myDrop();});
gc.addEventListener('click',function(){myDrop();});
gc.addEventListener('touchstart',function(e){e.preventDefault();myDrop();},{passive:false});
document.addEventListener('keydown',function(e){if(e.code==='Space'){e.preventDefault();myDrop();}});

updUI();loop();connect();
