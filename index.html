<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Chip Stacker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{--bg:#0c0e14;--card:#151820;--card2:#1a1d28;--bdr:#252a3a;--bdr2:#2d3350;--gold:#e2b93b;--green:#00d26a;--red:#ff4757;--blue:#3b82f6;--purple:#a855f7;--t1:#f0f2f5;--t2:#9ca3b4;--t3:#5a6178;--t4:#363d52;--f:'Inter',-apple-system,sans-serif;--m:'JetBrains Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--t1);font-family:var(--f);display:flex;flex-direction:column;align-items:center;min-height:100vh;user-select:none;overflow-x:hidden}
.header{text-align:center;padding:14px 0 6px}
.logo{font-size:1.5em;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,#e2b93b,#f5d77a 40%,#e2b93b 60%,#c49a2e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 2px 12px rgba(226,185,59,.3))}
.tagline{color:var(--t3);font-size:.6em;letter-spacing:4px;text-transform:uppercase;margin-top:2px;font-weight:500}
.meta-bar{display:flex;align-items:center;gap:8px;margin:6px 0 10px;flex-wrap:wrap;justify-content:center}
.pill{display:flex;align-items:center;gap:5px;font-size:.62em;padding:3px 10px;background:var(--card);border:1px solid var(--bdr);border-radius:20px;font-weight:500}
.cdot{width:6px;height:6px;border-radius:50%}
.cdot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.cdot.bad{background:var(--red);box-shadow:0 0 6px var(--red)}
.cdot.wait{background:var(--gold);box-shadow:0 0 6px var(--gold);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.rpill{display:flex;align-items:center;gap:5px;font-size:.62em;padding:3px 10px;background:rgba(59,130,246,.08);border:1px solid rgba(59,130,246,.2);border-radius:20px;cursor:pointer;transition:all .2s;font-weight:500;color:var(--blue)}
.rpill:hover{background:rgba(59,130,246,.18)}
.rpill svg{width:11px;height:11px;fill:currentColor}
.rpill.copied{color:var(--green);border-color:rgba(0,210,106,.3);background:rgba(0,210,106,.08)}
.gw{display:flex;gap:12px;align-items:flex-start;justify-content:center;padding:0 8px;max-width:960px;width:100%}
/* Left panel */
.pn{background:var(--card);border-radius:12px;padding:12px;width:220px;border:1px solid var(--bdr);position:relative;overflow:hidden}
.pn::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--bdr2),transparent)}
.pt{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid var(--bdr)}
.pt h3{font-size:.68em;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.pt .badge{font-size:.58em;font-weight:600;color:var(--t3);background:var(--card2);padding:2px 7px;border-radius:10px;border:1px solid var(--bdr)}
/* Multiplier box */
.multi-box{text-align:center;padding:12px 8px;background:linear-gradient(135deg,rgba(0,210,106,.06),rgba(226,185,59,.04));border:1px solid rgba(0,210,106,.12);border-radius:10px;margin-bottom:8px;transition:border-color .3s}
.multi-box.hot{border-color:rgba(255,71,87,.3);background:linear-gradient(135deg,rgba(255,71,87,.06),rgba(255,165,2,.04))}
.multi-label{font-size:.5em;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:2px}
.multi-val{font-size:2.4em;font-weight:900;font-family:var(--m);letter-spacing:-1px;color:var(--green);transition:color .3s;text-shadow:0 0 20px rgba(0,210,106,.2)}
.multi-box.hot .multi-val{color:var(--red);text-shadow:0 0 20px rgba(255,71,87,.3)}
/* Balance */
.bal-box{text-align:center;padding:8px;background:rgba(226,185,59,.06);border:1px solid rgba(226,185,59,.1);border-radius:10px;margin-bottom:8px}
.bal-label{font-size:.48em;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:rgba(226,185,59,.4);margin-bottom:1px}
.bal-val{font-size:1.4em;font-weight:800;color:var(--gold);font-family:var(--m)}
/* Stats */
.sr{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:.7em}
.sr .l{color:var(--t3);font-weight:500}.sr .v{font-weight:700;font-family:var(--m);font-size:.9em}
.sr .v.pos{color:var(--green)}.sr .v.neg{color:var(--red)}
/* Player list */
.pl{margin-top:6px}
.pc{display:flex;align-items:center;gap:6px;padding:5px 7px;margin-bottom:2px;border-radius:7px;font-size:.65em;background:var(--card2)}
.pa{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.65em;color:rgba(0,0,0,.7);flex-shrink:0;box-shadow:0 2px 6px rgba(0,0,0,.3)}
.pname{flex:1;font-weight:600;color:var(--t2);min-width:0}
.pname.me{color:var(--gold)}
.pstat{font-family:var(--m);font-size:.8em;font-weight:600;padding:1px 5px;border-radius:4px}
.pstat.active{color:var(--red);background:rgba(255,71,87,.1)}
.pstat.out{color:var(--green);background:rgba(0,210,106,.1)}
.pstat.wait{color:var(--t4)}
.es{padding:5px 7px;margin-bottom:2px;font-size:.58em;color:var(--t4);border:1px dashed var(--bdr);border-radius:7px;text-align:center;font-weight:500}
.hs{margin-top:6px;padding-top:6px;border-top:1px solid var(--bdr);text-align:center;font-size:.55em;color:var(--t4);font-weight:500}
/* Game area */
.ga{position:relative}
.cw{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--bdr);box-shadow:0 8px 40px rgba(0,0,0,.5);touch-action:none;background:var(--bg)}
canvas{display:block}
.pop{position:absolute;top:30%;left:50%;transform:translate(-50%,-50%);font-size:1.8em;font-weight:900;pointer-events:none;opacity:0;z-index:10;white-space:nowrap;letter-spacing:1px;font-family:var(--f);text-shadow:0 4px 24px rgba(0,0,0,.9)}
.evl{position:absolute;top:14%;left:50%;transform:translateX(-50%);font-size:1em;font-weight:900;letter-spacing:4px;text-transform:uppercase;opacity:0;white-space:nowrap;font-family:var(--f);text-shadow:0 2px 20px rgba(0,0,0,.9);z-index:8;pointer-events:none}
.cd-overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none;z-index:9}
.cd-num{font-size:5em;font-weight:900;font-family:var(--m);color:var(--gold);opacity:0;text-shadow:0 4px 30px rgba(226,185,59,.5)}
/* Controls */
.ctrls{display:flex;gap:8px;margin-top:8px;justify-content:center}
.btn{position:relative;padding:12px 32px;font-size:.95em;font-weight:800;border:none;border-radius:10px;cursor:pointer;font-family:var(--f);letter-spacing:.5px;transition:all .15s;touch-action:manipulation;overflow:hidden}
.btn::before{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,.1),transparent);border-radius:10px 10px 0 0;pointer-events:none}
.btn:disabled{background:var(--card2)!important;color:var(--t4)!important;cursor:not-allowed;transform:none!important;box-shadow:none!important}
.btn:disabled::before{display:none}
.btn-drop{background:linear-gradient(135deg,#ff4757,#e8293a);color:#fff}
.btn-drop:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(255,71,87,.4)}
.btn-cash{background:linear-gradient(135deg,#00d26a,#00b85c);color:#fff}
.btn-cash:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,210,106,.4)}
.btn-cash .amt{font-family:var(--m);margin-left:4px}
/* Emoji bar */
.emoji-bar{display:flex;gap:4px;justify-content:center;margin-top:6px}
.emoji-btn{font-size:1.2em;cursor:pointer;padding:3px 6px;border-radius:6px;background:var(--card);border:1px solid var(--bdr);transition:all .15s;line-height:1}
.emoji-btn:hover{background:var(--card2);transform:scale(1.15)}
.emoji-btn:active{transform:scale(.9)}
.dh{text-align:center;font-size:.52em;color:var(--t4);margin-top:4px;font-weight:500;letter-spacing:1px}
/* Feed */
.feed{max-height:300px;overflow-y:auto;font-size:.6em;color:var(--t3);line-height:1.6;scrollbar-width:thin;scrollbar-color:var(--bdr) transparent;font-family:var(--m)}
.feed::-webkit-scrollbar{width:4px}.feed::-webkit-scrollbar-thumb{background:var(--bdr);border-radius:4px}
.feed div{padding:2px 5px;border-radius:3px;margin-bottom:1px}
.feed div:first-child{background:var(--card2)}
.feed .j{color:var(--gold);font-weight:600}.feed .d{color:var(--t3)}.feed .b{color:#ff8c42;font-weight:600}
.feed .s{color:var(--gold);font-weight:500}.feed .ev{color:var(--red);font-weight:700}
.feed .co{color:var(--green);font-weight:600}.feed .pen{color:var(--red);font-weight:700}
.pf{position:sticky;top:12px;align-self:flex-start}
@media(max-width:780px){.gw{flex-wrap:wrap}.pn{width:100%;max-width:420px}.pf{position:static}.ga{order:-1}}
</style>
</head>
<body>
<div class="header"><div class="logo">CHIP STACKER</div><div class="tagline">Aim &bull; Stack &bull; Cash Out</div></div>
<div class="meta-bar">
  <div class="pill"><div class="cdot wait" id="cdot"></div><span style="color:var(--t2)" id="ctxt">Connecting</span></div>
  <div class="rpill" id="rpill" onclick="copyLink()"><svg viewBox="0 0 16 16"><path d="M4.715 6.542L3.343 7.914a3 3 0 104.243 4.243l1.828-1.829A3 3 0 008.586 5.5L8 6.086a1 1 0 00-.154.199 2 2 0 01.861 3.337L6.88 11.45a2 2 0 11-2.83-2.83l.793-.792a4 4 0 01-.128-1.287z"/><path d="M6.586 4.672A3 3 0 007.414 9.5l.775-.776a2 2 0 01-.861-3.337L9.12 3.56a2 2 0 112.83 2.83l-.793.792c.112.42.155.855.128 1.287l1.372-1.372a3 3 0 10-4.243-4.243L6.586 4.672z"/></svg><span id="rlabel">Loading...</span></div>
</div>
<div class="gw">
  <div class="pn">
    <div class="pt"><h3>Game Room</h3><span class="badge" id="pcount">0/6</span></div>
    <div class="multi-box" id="mbox"><div class="multi-label">Multiplier</div><div class="multi-val" id="multi">1.00x</div></div>
    <div class="bal-box"><div class="bal-label">Your Balance</div><div class="bal-val" id="bal">100p</div></div>
    <div class="sr"><span class="l">Your Bet</span><span class="v" id="mybet">0p</span></div>
    <div class="sr"><span class="l">P/L</span><span class="v" id="pnl">+0p</span></div>
    <div class="pl" id="plist"></div>
    <div class="hs">House: 1.5% &bull; <span id="ht">0.0</span>p</div>
  </div>
  <div class="ga">
    <div class="cw" id="cwrap">
      <canvas id="gc" width="420" height="680"></canvas>
      <div class="cd-overlay"><div class="cd-num" id="cdnum"></div></div>
      <div class="evl" id="evl"></div>
      <div class="pop" id="pop"></div>
    </div>
    <div class="ctrls">
      <button class="btn btn-drop" id="dbtn">DROP 1p</button>
      <button class="btn btn-cash" id="cbtn" disabled>CASH OUT</button>
    </div>
    <div class="emoji-bar" id="ebar">
      <span class="emoji-btn" data-id="fire">&#x1F525;</span>
      <span class="emoji-btn" data-id="skull">&#x1F480;</span>
      <span class="emoji-btn" data-id="money">&#x1F4B0;</span>
      <span class="emoji-btn" data-id="laugh">&#x1F602;</span>
      <span class="emoji-btn" data-id="sweat">&#x1F630;</span>
    </div>
    <div class="dh">Drag to aim &bull; Click to drop &bull; Cash out anytime</div>
  </div>
  <div class="pn pf">
    <div class="pt"><h3>Live Feed</h3><span class="badge" style="color:var(--green)">LIVE</span></div>
    <div class="feed" id="log"></div>
  </div>
</div>

<script>
(function(){
var gc=document.getElementById('gc'),ctx=gc.getContext('2d');
var W=gc.width,H=gc.height,GY=H-44,CX=W/2,GRAV=.45,CW=64,CHH=15,MAX_OX=11;

// ===== STATE =====
var ws,myIdx=-1,myName='',roomId='',players=[],connected=false,pendingMyDrops=0;
var stack=[],inflights=[],fallers=[],sparks=[];
var shake=0,house=0,collapsed=false,pendingCollapse=null;
var screenFlash=0,screenFlashCol='#fff';
var eventFx=null;
var gameState='waiting'; // waiting|countdown|active|collapsing
var multiplier=1.0,wobble=0.0;

// Cursor (aimed drops)
var cursorOx=0,cursorActive=false,isDragging=false;

// Floating emojis
var floatingEmojis=[];

// Ambient
var ambDots=[];for(var i=0;i<20;i++)ambDots.push({x:Math.random()*W,y:Math.random()*H,vy:-.08-Math.random()*.12,a:Math.random()*.25,sz:1+Math.random()});

var EMOJIS={fire:'\u{1F525}',skull:'\u{1F480}',money:'\u{1F4B0}',laugh:'\u{1F602}',sweat:'\u{1F630}'};
var EVENT_META={
  bomb:{label:'BOMB DROP!',color:'#ff4757',logMsg:'A bomb obliterated the stack!'},
  lightning:{label:'LIGHTNING STRIKE!',color:'#f0c040',logMsg:'Lightning struck the stack!'},
  tsunami:{label:'TSUNAMI!',color:'#3b82f6',logMsg:'A massive wave swept everything away!'},
  cat:{label:'CAT ATTACK!',color:'#c084fc',logMsg:'A cat knocked over the stack!'},
  meteor:{label:'METEOR IMPACT!',color:'#ff6b35',logMsg:'A meteor crashed into the chips!'},
  ufo:{label:'UFO ABDUCTION!',color:'#00d26a',logMsg:'A UFO beam snatched the chips!'},
};

// ===== CHIP =====
function makeChip(cx,cy,pidx){return{x:cx,y:cy,vx:0,vy:0,ang:0,va:0,pidx:pidx,w:CW,h:CHH,op:1,sq:1,sqv:0,glow:0};}

// ===== PARTICLES =====
function mkS(px,py,vx,vy,col,life,sz,tp){return{x:px,y:py,vx:vx,vy:vy,col:col,life:life,ml:life,sz:sz,tp:tp};}
function upS(s){s.vy+=.1;s.x+=s.vx;s.y+=s.vy;s.vx*=.99;s.life--;}
function drS(s){
  var a=Math.max(0,s.life/s.ml);ctx.save();ctx.globalAlpha=a;
  if(s.tp==='s'){ctx.strokeStyle=s.col;ctx.lineWidth=s.sz;ctx.beginPath();ctx.moveTo(s.x,s.y);ctx.lineTo(s.x-s.vx*4,s.y-s.vy*4);ctx.stroke();}
  else if(s.tp==='g'){var g=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.sz*1.5);g.addColorStop(0,s.col);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(s.x-s.sz*2,s.y-s.sz*2,s.sz*4,s.sz*4);}
  else if(s.tp==='r'){ctx.fillStyle=s.col;ctx.fillRect(s.x-s.sz/2,s.y-s.sz/2,s.sz*a,s.sz*a);}
  ctx.restore();
}
function boom(px,py,col,n){for(var i=0;i<n;i++){var a=Math.random()*Math.PI*2,sp=2+Math.random()*4;sparks.push(mkS(px,py,Math.cos(a)*sp,Math.sin(a)*sp-2,col,30+Math.random()*25,2+Math.random()*1.5,'s'));}}

// ===== EVENT FX (canvas-drawn) =====
function startEventFx(type,total){
  var mid=GY-total*CHH/2;eventFx={type:type,t:0,dur:210,mid:mid,total:total,data:{}};
  if(type==='lightning'){var pts=[{x:CX+(Math.random()-.5)*30,y:-10}];var py=pts[0].y;while(py<mid+40){py+=15+Math.random()*20;pts.push({x:CX+(Math.random()-.5)*80,y:py});}eventFx.data.bolt=pts;eventFx.data.branches=[];for(var i=2;i<pts.length;i+=2){var bp=[{x:pts[i].x,y:pts[i].y}];var bpy=pts[i].y;for(var j=0;j<3;j++){bpy+=10+Math.random()*15;bp.push({x:pts[i].x+(Math.random()-.5)*60,y:bpy});}eventFx.data.branches.push(bp);}}
  if(type==='meteor'){eventFx.data.sx=W*.8;eventFx.data.sy=-30;eventFx.data.ex=CX;eventFx.data.ey=mid;}
  if(type==='tsunami')eventFx.dur=240;
  if(type==='ufo')eventFx.dur=260;
  spawnEventSparks(type,total,mid);
}
function spawnEventSparks(type,total,mid){
  var cs;
  switch(type){
    case'bomb':cs=['#ff4757','#ff6b6b','#ffa502','#fff'];for(var i=0;i<80;i++){var a=Math.random()*Math.PI*2,sp=4+Math.random()*10;sparks.push(mkS(CX,mid,Math.cos(a)*sp,Math.sin(a)*sp-5,cs[i%4],40+Math.random()*40,3+Math.random()*3,'s'));}break;
    case'lightning':cs=['#f0c040','#fff','#ffe066'];for(var i=0;i<50;i++){var a=Math.random()*Math.PI*2,sp=3+Math.random()*6;sparks.push(mkS(CX+(Math.random()-.5)*50,mid,Math.cos(a)*sp*.4,Math.sin(a)*sp,cs[i%3],25+Math.random()*20,1.5+Math.random()*1.5,'s'));}break;
    case'tsunami':cs=['#3b82f6','#60a5fa','#93c5fd','#fff'];for(var i=0;i<60;i++)sparks.push(mkS(-20,GY-Math.random()*total*CHH,6+Math.random()*8,(Math.random()-.5)*3,cs[i%4],50+Math.random()*40,3+Math.random()*3,'s'));break;
    case'cat':cs=['#a855f7','#c084fc','#e9d5ff'];for(var i=0;i<40;i++)sparks.push(mkS(W+10,mid+(Math.random()-.5)*80,-8-Math.random()*6,(Math.random()-.5)*5,cs[i%3],35+Math.random()*30,2.5+Math.random()*2,'s'));break;
    case'meteor':cs=['#ff6b35','#ff4757','#ffa502','#fff'];for(var i=0;i<50;i++){var a=Math.random()*Math.PI*2,sp=5+Math.random()*8;sparks.push(mkS(CX,mid,Math.cos(a)*sp,Math.sin(a)*sp-3,cs[i%4],35+Math.random()*35,2.5+Math.random()*2.5,'s'));}break;
    case'ufo':cs=['#00d26a','#34d399','#6ee7b7','#fff'];for(var i=0;i<40;i++)sparks.push(mkS(CX+(Math.random()-.5)*60,mid+(Math.random()-.5)*60,(Math.random()-.5)*2,-4-Math.random()*6,cs[i%4],35+Math.random()*30,2+Math.random()*2,'s'));break;
  }
}
function drawEventFx(){
  if(!eventFx)return;var fx=eventFx,p=fx.t/fx.dur;ctx.save();
  switch(fx.type){
    case'bomb':if(p<.5){var rp=p/.5,r=rp*180;ctx.globalAlpha=(1-rp)*.6;ctx.strokeStyle='#ff4757';ctx.lineWidth=3-rp*2;ctx.beginPath();ctx.arc(CX,fx.mid,r,0,Math.PI*2);ctx.stroke();var grd=ctx.createRadialGradient(CX,fx.mid,0,CX,fx.mid,r);grd.addColorStop(0,'rgba(255,71,87,.15)');grd.addColorStop(1,'transparent');ctx.fillStyle=grd;ctx.fill();}if(p>.15&&p<.65){var rp2=(p-.15)/.5;ctx.globalAlpha=(1-rp2)*.35;ctx.strokeStyle='#ffa502';ctx.lineWidth=2;ctx.beginPath();ctx.arc(CX,fx.mid,rp2*140,0,Math.PI*2);ctx.stroke();}break;
    case'lightning':if(p<.4){var bp=Math.min(1,p/.15),bolt=fx.data.bolt,dn=Math.ceil(bolt.length*bp);ctx.globalAlpha=.4*(1-p/.4);ctx.strokeStyle='#ffe066';ctx.lineWidth=12;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(bolt[0].x,bolt[0].y);for(var i=1;i<dn;i++)ctx.lineTo(bolt[i].x,bolt[i].y);ctx.stroke();ctx.globalAlpha=1*(1-p/.4);ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(bolt[0].x,bolt[0].y);for(var i=1;i<dn;i++)ctx.lineTo(bolt[i].x,bolt[i].y);ctx.stroke();if(bp>.5){ctx.globalAlpha=.6*(1-p/.4);ctx.strokeStyle='#f0c040';ctx.lineWidth=1.5;var br=fx.data.branches;for(var b=0;b<br.length;b++){ctx.beginPath();ctx.moveTo(br[b][0].x,br[b][0].y);for(var j=1;j<br[b].length;j++)ctx.lineTo(br[b][j].x,br[b][j].y);ctx.stroke();}}if(p<.06){ctx.globalAlpha=.5*(1-p/.06);ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);}}break;

function playEventLabel(type){var m=EVENT_META[type];if(!m)return;var el=document.getElementById('evl');el.textContent=m.label;el.style.color=m.color;gsap.killTweensOf(el);gsap.fromTo(el,{opacity:0,scale:.6,y:10},{opacity:1,scale:1,y:0,duration:.5,ease:'back.out(2)',onComplete:function(){gsap.to(el,{opacity:0,y:-20,duration:.7,delay:2.2,ease:'power2.in'});}});gsap.to('#cwrap',{x:function(){return(Math.random()-.5)*10;},y:function(){return(Math.random()-.5)*6;},duration:.05,repeat:12,yoyo:true,ease:'none',onComplete:function(){gsap.set('#cwrap',{x:0,y:0});}});gsap.fromTo('#multi',{scale:1},{scale:1.2,duration:.15,yoyo:true,repeat:3,ease:'power2.inOut'});}

// ===== STACK =====
function stackTopY(){var n=stack.length+inflights.length;return n===0?GY:GY-n*CHH;}
function launchChip(pidx,ox){if(pidx>=players.length)return;var ch=makeChip(CX+ox*(CW*.4),- 30,pidx);ch.vy=5;ch.vx=0;ch.targetStackIdx=stack.length+inflights.length;inflights.push(ch);}
function chipLands(ch,idx){
  inflights.splice(idx,1);ch.y=GY-(stack.length+1)*CHH;ch.vy=0;ch.vx=0;ch.sq=.5;ch.sqv=.12;ch.glow=1;stack.push(ch);
  boom(ch.x,ch.y+ch.h,pidxCol(ch.pidx),8);
  // Wobble proportional to server wobble
  var force=1+wobble*3;for(var i=0;i<stack.length-1;i++){stack[i].vx+=(Math.random()-.5)*force;stack[i].va+=(Math.random()-.5)*.02;stack[i].sq=.87+Math.random()*.1;stack[i].sqv=.025;}
  shake=4+wobble*10;
  if(pendingCollapse&&inflights.length===0){var pc=pendingCollapse;pendingCollapse=null;doCollapseVisual(pc);}
}

function doCollapseVisual(data){
  collapsed=true;gameState='collapsing';
  var event=data.event||'bomb';
  for(var i=0;i<stack.length;i++){
    var ch=stack[i];
    switch(event){case'tsunami':ch.vx=6+Math.random()*8;ch.vy=-(1+Math.random()*4);break;case'cat':ch.vx=-(5+Math.random()*8);ch.vy=-(2+Math.random()*5);break;case'ufo':ch.vx=(Math.random()-.5)*3;ch.vy=-(8+Math.random()*8);break;case'meteor':ch.vx=(Math.random()-.5)*10;ch.vy=2+Math.random()*5;break;default:ch.vx=(Math.random()-.5)*14;ch.vy=-(4+Math.random()*7);}
    ch.va=(Math.random()-.5)*.3;ch.glow=1;ch.fadeTimer=120+Math.floor(Math.random()*60);fallers.push(ch);
  }
  stack=[];inflights=[];shake=25;screenFlash=1;screenFlashCol=EVENT_META[event]?EVENT_META[event].color:'#fff';
  startEventFx(event,data.total||10);playEventLabel(event);
  if(EVENT_META[event])addLog(EVENT_META[event].logMsg,'ev');

  // Payouts
  if(data.payouts){for(var i=0;i<data.payouts.length;i++){var po=data.payouts[i];
    if(po.status==='lastDropper')addLog(po.name+' caused the collapse! DOUBLE LOSS: '+po.net+'p','pen');
    else if(po.status==='lost')addLog(po.name+' lost '+(-po.net)+'p','b');
    else if(po.status==='cashedOut')addLog(po.name+' safe — cashed out at '+po.multi+'x (+'+po.net+'p)','co');
  }}
  // Sync balances
  if(data.balances){for(var i=0;i<data.balances.length&&i<players.length;i++)players[i].bal=data.balances[i];}
  pendingMyDrops=0;updUI();
}

function pidxCol(p){return(p>=0&&p<players.length)?players[p].col:'#555';}
function showPop(txt,col){var p=document.getElementById('pop');p.textContent=txt;p.style.color=col;gsap.killTweensOf(p);gsap.fromTo(p,{opacity:0,y:0,scale:.5},{opacity:1,y:-40,scale:1,duration:.5,ease:'back.out(2)',onComplete:function(){gsap.to(p,{opacity:0,y:-70,duration:.6,delay:1.5,ease:'power2.in'});}});}

// ===== PLAYER ACTIONS =====
function myDrop(){
  if(!connected||gameState!=='active'||myIdx===-1)return;
  var mp=players[myIdx];if(!mp||mp.bal<1||mp.cashedOut)return;
  var now=Date.now();if(myDrop._last&&(now-myDrop._last)<250)return;myDrop._last=now;
  var ox=cursorOx;
  launchChip(myIdx,ox);mp.bal-=1;mp.roundBet=(mp.roundBet||0)+1;
  addLog(mp.name+' dropped 1p','d');updUI();
  ws.send(JSON.stringify({type:'drop',ox:ox}));pendingMyDrops++;
}
function myCashOut(){
  if(!connected||gameState!=='active'||myIdx===-1)return;
  var mp=players[myIdx];if(!mp||mp.cashedOut||(mp.roundBet||0)<=0)return;
  ws.send(JSON.stringify({type:'cashout'}));
}
function sendEmoji(id){
  if(!connected||!ws)return;
  ws.send(JSON.stringify({type:'emoji',id:id}));
}

// ===== WEBSOCKET =====
function connect(){
  var proto=location.protocol==='https:'?'wss:':'ws:',room=new URLSearchParams(location.search).get('room')||'';
  ws=new WebSocket(proto+'//'+location.host+'/?room='+room);
  ws.onopen=function(){connected=true;setConn('ok','Connected');};
  ws.onclose=function(){connected=false;setConn('bad','Disconnected');};
  ws.onerror=function(){setConn('bad','Error');};
  ws.onmessage=function(e){var msg;try{msg=JSON.parse(e.data);}catch(er){return;}handleMsg(msg);};
}
function handleMsg(msg){
  switch(msg.type){
    case'welcome':roomId=msg.roomId;myIdx=msg.yourIdx;myName=msg.yourName;if(history.replaceState)history.replaceState(null,'','?room='+roomId);document.getElementById('rlabel').textContent=roomId+' \u2014 copy link';addLog('You joined as '+myName,'s');break;

    case'state':
      players=msg.players;house=msg.house;multiplier=msg.multiplier;wobble=msg.wobble;gameState=msg.gameState;
      for(var i=0;i<players.length;i++){if(players[i].isYou){myIdx=i;break;}}
      if(inflights.length===0&&gameState!=='collapsing')syncStack(msg.stack);
      for(var i=0;i<inflights.length;i++){if(inflights[i].pidx>=players.length)inflights[i].pidx=Math.max(0,players.length-1);}
      for(var i=0;i<fallers.length;i++){if(fallers[i].pidx>=players.length)fallers[i].pidx=Math.max(0,players.length-1);}
      collapsed=gameState==='collapsing';pendingMyDrops=0;updUI();break;

    case'countdown':
      gameState='countdown';
      var el=document.getElementById('cdnum');el.textContent=msg.seconds;
      gsap.killTweensOf(el);gsap.fromTo(el,{opacity:1,scale:.3},{opacity:0,scale:1.5,duration:.9,ease:'power2.out'});
      break;

    case'roundStart':
      gameState='active';multiplier=1.0;wobble=0;collapsed=false;
      stack=[];inflights=[];fallers=[];sparks=[];pendingMyDrops=0;pendingCollapse=null;eventFx=null;
      addLog('--- Round '+msg.roundNum+' ---','s');updUI();break;

    case'drop':
      if(msg.pidx===myIdx&&pendingMyDrops>0){pendingMyDrops--;if(msg.pidx<players.length)players[msg.pidx].bal=msg.bal;}
      else{addLog(msg.name+' dropped 1p','d');launchChip(msg.pidx,msg.ox);if(msg.pidx<players.length){players[msg.pidx].drops++;players[msg.pidx].bal=msg.bal;}}
      multiplier=msg.multiplier;wobble=msg.wobble;
      // Update round bet for the dropper
      if(msg.pidx<players.length)players[msg.pidx].roundBet=(players[msg.pidx].roundBet||0)+1;
      updUI();break;

    case'tick':multiplier=msg.multiplier;wobble=msg.wobble;updUI();break;

    case'cashout':
      if(msg.pidx<players.length){players[msg.pidx].cashedOut=true;players[msg.pidx].cashOutMultiplier=msg.multiplier;players[msg.pidx].bal=msg.bal;players[msg.pidx].roundBet=0;}
      addLog(msg.name+' cashed out at '+msg.multiplier+'x (+'+msg.winnings+'p)','co');
      if(msg.pidx===myIdx)showPop('CASHED OUT +'+msg.winnings+'p','#00d26a');
      updUI();break;

    case'collapse':
      var evData={event:msg.event,total:msg.total,payouts:msg.payouts,balances:msg.balances,lastDropperIdx:msg.lastDropperIdx,lastDropperName:msg.lastDropperName};
      if(inflights.length>0)pendingCollapse=evData;
      else doCollapseVisual(evData);
      // Show last dropper blame
      setTimeout(function(){
        if(msg.lastDropperIdx===myIdx)showPop('YOU caused the collapse!','#ff4757');
        else showPop(msg.lastDropperName+' collapsed it!','#ff8c42');
      },1800);
      break;

    case'allCashedOut':addLog('Everyone cashed out! Round ends.','s');gameState='waiting';updUI();break;
    case'playerJoined':addLog(msg.name+' joined ('+msg.playerCount+'/6)','s');break;
    case'playerLeft':addLog(msg.name+' left ('+msg.playerCount+'/6)','s');break;
    case'emoji':
      if(msg.pidx<players.length){var em=EMOJIS[msg.id]||'\u{1F525}';floatingEmojis.push({emoji:em,x:CX+(Math.random()-.5)*100,y:GY-100,life:90,ml:90,col:players[msg.pidx].col});}break;
    case'error':addLog('Error: '+msg.msg,'b');setConn('bad',msg.msg);break;
  }
}
function syncStack(ss){while(stack.length>ss.length)stack.pop();while(stack.length<ss.length){var idx=stack.length;var ch=makeChip(CX+((ss[idx].ox||0)*(CW*.4)),GY-(idx+1)*CHH,ss[idx].pidx);ch.sq=1;ch.glow=0;stack.push(ch);}for(var i=0;i<stack.length;i++)stack[i].pidx=ss[i].pidx;}
function setConn(c,t){document.getElementById('cdot').className='cdot '+c;document.getElementById('ctxt').textContent=t;}
function copyLink(){var url=location.origin+'/?room='+roomId;if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){var el=document.getElementById('rpill'),lb=document.getElementById('rlabel');el.classList.add('copied');lb.textContent='Link copied!';setTimeout(function(){el.classList.remove('copied');lb.textContent=roomId+' \u2014 copy link';},2000);});}}

// ===== PHYSICS =====
function physics(){
  for(var i=inflights.length-1;i>=0;i--){var ch=inflights[i];ch.vy+=GRAV;ch.x+=ch.vx;ch.y+=ch.vy;if(ch.y>=GY-(stack.length+1)*CHH){ch.y=GY-(stack.length+1)*CHH;chipLands(ch,i);}}
  for(var i=0;i<stack.length;i++){var s=stack[i];s.sqv+=(1-s.sq)*.15;s.sqv*=.65;s.sq+=s.sqv;s.glow*=.92;s.vx*=.84;s.x+=s.vx;s.ang+=s.va;s.va*=.86;s.ang*=.9;var dr=s.x-CX;if(Math.abs(dr)>18)s.vx-=dr*.02;s.y+=(GY-(i+1)*CHH-s.y)*.3;
    // Ambient wobble proportional to danger
    if(wobble>.2)s.vx+=(Math.random()-.5)*wobble*.3;
  }
  for(var i=fallers.length-1;i>=0;i--){var f=fallers[i];f.vy+=GRAV*.7;f.x+=f.vx;f.y+=f.vy;f.ang+=f.va;f.sqv+=(1-f.sq)*.1;f.sqv*=.6;f.sq+=f.sqv;if(f.x<15){f.x=15;f.vx*=-.5;}if(f.x>W-15){f.x=W-15;f.vx*=-.5;}if(f.y>GY-f.h/2){f.y=GY-f.h/2;f.vy*=-.3;f.vx*=.6;f.va*=.4;f.sq=.6;f.sqv=.05;if(Math.abs(f.vy)<.8)f.vy=0;}if(f.fadeTimer!==undefined){f.fadeTimer--;if(f.fadeTimer<=0)f.op-=.03;}if(f.x<-30||f.x>W+30||f.y<-50||f.y>H+30)f.op-=.06;if(f.op<=0)fallers.splice(i,1);}
  for(var i=sparks.length-1;i>=0;i--){upS(sparks[i]);if(sparks[i].life<=0)sparks.splice(i,1);}
  if(sparks.length>300)sparks.splice(0,sparks.length-300);
  if(eventFx){eventFx.t++;if(eventFx.t>=eventFx.dur)eventFx=null;}
  if(screenFlash>0){screenFlash*=.95;if(screenFlash<.01)screenFlash=0;}
  if(shake>0){shake*=.8;if(shake<.15)shake=0;}
  // Floating emojis
  for(var i=floatingEmojis.length-1;i>=0;i--){var fe=floatingEmojis[i];fe.y-=1.2;fe.life--;if(fe.life<=0)floatingEmojis.splice(i,1);}
  // Ambient
  for(var i=0;i<ambDots.length;i++){var d=ambDots[i];d.y+=d.vy;if(d.y<-5){d.y=H+5;d.x=Math.random()*W;}}
}

// ===== DRAW =====
function drawChip(ch,ox,oy,ang,opacity){
  var hw=ch.w/2,hh=ch.h/2,col=pidxCol(ch.pidx),sq=ch.sq||1;
  ctx.save();ctx.globalAlpha=opacity!==undefined?opacity:1;ctx.translate(ox,oy+hh);if(ang)ctx.rotate(ang);ctx.scale(1+(1-sq)*.5,sq);
  var dp=Math.max(4,ch.h*.4),c1=col,c2=lighten(col,35),c3=darken(col,45);
  if(ch.glow>.05){ctx.fillStyle=col+'44';ctx.beginPath();ctx.ellipse(0,hh,hw*1.3,dp*2,0,0,Math.PI*2);ctx.fill();}
  ctx.fillStyle='rgba(0,0,0,.25)';ctx.beginPath();ctx.ellipse(3,hh+5,hw*.85,dp*.4,0,0,Math.PI*2);ctx.fill();
  for(var dy=dp;dy>=0;dy-=2){ctx.fillStyle=lerpC(c3,c1,dy/dp);ctx.beginPath();ctx.ellipse(0,hh-dy*.6,hw,hh*.6,0,0,Math.PI*2);ctx.fill();}
  var tg=ctx.createRadialGradient(-hw*.3,-hh*.3,0,0,0,hw);tg.addColorStop(0,lighten(c2,30));tg.addColorStop(.5,c1);tg.addColorStop(1,darken(c1,20));
  ctx.fillStyle=tg;ctx.beginPath();ctx.ellipse(0,-hh*.15,hw,hh*.75,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.12)';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(0,-hh*.15,hw*.6,hh*.45,0,0,Math.PI*2);ctx.stroke();
  var sg=ctx.createRadialGradient(-hw*.25,-hh*.5,0,-hw*.15,-hh*.3,hw*.5);sg.addColorStop(0,'rgba(255,255,255,.28)');sg.addColorStop(.6,'rgba(255,255,255,.04)');sg.addColorStop(1,'rgba(255,255,255,0)');
  ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(0,-hh*.15,hw,hh*.75,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 9px Inter,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.shadowColor='rgba(0,0,0,.5)';ctx.shadowBlur=2;ctx.fillText('1p',0,-hh*.15);ctx.shadowBlur=0;
  ctx.restore();
}

function drawScene(){
  var bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#0a0c12');bg.addColorStop(.5,'#0e1018');bg.addColorStop(1,'#0c0e16');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,.03)';for(var i=0;i<ambDots.length;i++){var d=ambDots[i];ctx.globalAlpha=d.a;ctx.beginPath();ctx.arc(d.x,d.y,d.sz,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
  ctx.strokeStyle='rgba(255,255,255,.012)';ctx.lineWidth=1;for(var x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}for(var y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  var vg=ctx.createRadialGradient(CX,H/2,H*.15,CX,H/2,H*.7);vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.5)');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  // Platform with wobble-based glow
  var pw=140,pl=CX-pw/2,pr=CX+pw/2;
  var dangerR=Math.min(1,wobble*2),gr=Math.round(59+dangerR*196),gg=Math.round(130-dangerR*59),gb=Math.round(246-dangerR*176);
  var ug=ctx.createRadialGradient(CX,GY+5,0,CX,GY+5,pw*(.5+dangerR*.3));
  ug.addColorStop(0,'rgba('+gr+','+gg+','+gb+','+(0.04+dangerR*.12)+')');ug.addColorStop(1,'transparent');
  ctx.fillStyle=ug;ctx.fillRect(pl-80,GY-20,pw+160,50);
  var pg=ctx.createLinearGradient(pl,GY,pl,GY+16);pg.addColorStop(0,'#2a4a6e');pg.addColorStop(.3,'#1e3a58');pg.addColorStop(1,'#142840');
  ctx.fillStyle=pg;ctx.beginPath();ctx.moveTo(pl-6,GY);ctx.lineTo(pr+6,GY);ctx.lineTo(pr,GY+12);ctx.lineTo(pl,GY+12);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba('+gr+','+gg+','+gb+','+(0.12+dangerR*.2)+')';ctx.fillRect(pl-4,GY,pw+8,1.5);
  ctx.fillStyle='#0e1e30';ctx.fillRect(pl+8,GY+10,6,18);ctx.fillRect(pr-14,GY+10,6,18);

  // Danger meter (right side)
  if(gameState==='active'&&wobble>0){
    var mx=W-18,my=GY-200,mh=180,mw=8;
    ctx.fillStyle='rgba(255,255,255,.03)';ctx.fillRect(mx-mw/2,my,mw,mh);
    var fill=wobble*mh;
    var mg=ctx.createLinearGradient(0,my+mh-fill,0,my+mh);
    mg.addColorStop(0,wobble>.6?'#ff4757':wobble>.3?'#ffa502':'#00d26a');mg.addColorStop(1,wobble>.6?'#ff6b6b':wobble>.3?'#ffcc02':'#34d399');
    ctx.fillStyle=mg;ctx.fillRect(mx-mw/2,my+mh-fill,mw,fill);
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=1;ctx.strokeRect(mx-mw/2,my,mw,mh);
    ctx.fillStyle='rgba(255,255,255,.3)';ctx.font='600 8px Inter,sans-serif';ctx.textAlign='center';ctx.fillText('DANGER',mx,my-6);
  }
}

function drawCursor(){
  if(gameState!=='active')return;
  var mp=players[myIdx];if(!mp||mp.cashedOut)return;
  var cx=CX+cursorOx*(CW*.4);
  // Guide line
  ctx.save();ctx.globalAlpha=.25;ctx.strokeStyle='#fff';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,stackTopY());ctx.stroke();ctx.setLineDash([]);
  // Ghost chip
  ctx.globalAlpha=.3;
  var ghost=makeChip(cx,stackTopY()-CHH,myIdx);ghost.sq=1;ghost.glow=0;
  drawChip(ghost,cx,stackTopY()-CHH,0,.3);
  // Offset indicator
  var offRatio=Math.abs(cursorOx)/MAX_OX;
  if(offRatio>.3){
    ctx.globalAlpha=offRatio*.5;ctx.fillStyle=offRatio>.7?'#ff4757':'#ffa502';ctx.font='bold 10px Inter,sans-serif';ctx.textAlign='center';
    ctx.fillText(offRatio>.7?'RISKY':'OFF-CENTER',cx,stackTopY()-CHH-12);
  }
  ctx.restore();
}

function render(){
  ctx.save();
  if(shake>0)ctx.translate((Math.random()-.5)*shake*2,(Math.random()-.5)*shake*2);
  drawScene();
  if(screenFlash>.01){ctx.save();ctx.globalAlpha=screenFlash*.3;ctx.fillStyle=screenFlashCol;ctx.fillRect(0,0,W,H);ctx.restore();}
  for(var i=0;i<sparks.length;i++)if(sparks[i].tp==='g')drS(sparks[i]);
  drawEventFx();
  for(var i=0;i<fallers.length;i++)drawChip(fallers[i],fallers[i].x,fallers[i].y,fallers[i].ang,fallers[i].op);
  for(var i=0;i<stack.length;i++)drawChip(stack[i],stack[i].x,stack[i].y,stack[i].ang);
  for(var i=0;i<inflights.length;i++)drawChip(inflights[i],inflights[i].x,inflights[i].y,0);
  for(var i=0;i<sparks.length;i++)if(sparks[i].tp!=='g')drS(sparks[i]);
  drawCursor();
  // Pot label
  var total=stack.length+inflights.length;
  if(total>0){var topY=GY-total*CHH;ctx.fillStyle='rgba(255,255,255,.25)';ctx.font='700 13px Inter,sans-serif';ctx.textAlign='left';ctx.fillText(total+'p',CX+CW/2+14,topY+CHH/2+4);}
  // Floating emojis
  for(var i=0;i<floatingEmojis.length;i++){var fe=floatingEmojis[i];ctx.globalAlpha=fe.life/fe.ml;ctx.font='24px sans-serif';ctx.textAlign='center';ctx.fillText(fe.emoji,fe.x,fe.y);ctx.globalAlpha=1;}
  ctx.restore();
}

// ===== HELPERS =====
function parseC(s){if(s[0]==='#')return[parseInt(s.slice(1,3),16),parseInt(s.slice(3,5),16),parseInt(s.slice(5,7),16)];var m=s.match(/(\d+)/g);return m?[+m[0],+m[1],+m[2]]:[128,128,128];}
function lighten(co,a){var p=parseC(co);return'rgb('+Math.min(255,p[0]+a)+','+Math.min(255,p[1]+a)+','+Math.min(255,p[2]+a)+')';}
function darken(co,a){var p=parseC(co);return'rgb('+Math.max(0,p[0]-a)+','+Math.max(0,p[1]-a)+','+Math.max(0,p[2]-a)+')';}
function lerpC(h1,h2,t){var a=parseC(h1),b=parseC(h2);return'rgb('+Math.round(a[0]+(b[0]-a[0])*t)+','+Math.round(a[1]+(b[1]-a[1])*t)+','+Math.round(a[2]+(b[2]-a[2])*t)+')';}

function loop(){physics();render();requestAnimationFrame(loop);}

// ===== UI =====
var lastPH='';
function updUI(){
  var total=stack.length+inflights.length;
  // Multiplier
  var mEl=document.getElementById('multi');mEl.textContent=multiplier.toFixed(2)+'x';
  var mBox=document.getElementById('mbox');mBox.className=multiplier>=2.5?'multi-box hot':'multi-box';
  // Balance
  var myP=(myIdx>=0&&myIdx<players.length)?players[myIdx]:null;
  var bal=myP?myP.bal:100;
  document.getElementById('bal').textContent=Math.round(bal)+'p';
  var pnl=bal-100,pe=document.getElementById('pnl');
  pe.textContent=(pnl>=0?'+':'')+Math.round(pnl)+'p';pe.className='v '+(pnl>=0?'pos':'neg');
  document.getElementById('mybet').textContent=(myP&&myP.roundBet?myP.roundBet:0)+'p';
  document.getElementById('ht').textContent=house.toFixed(1);
  document.getElementById('pcount').textContent=players.length+'/6';

  // Player list (safe DOM)
  var pKey='';for(var i=0;i<players.length;i++){var p=players[i];pKey+=p.name+p.col+(p.roundBet||0)+(p.cashedOut?'o':'a')+(p.isYou?'y':'');}
  if(pKey!==lastPH){
    var pl=document.getElementById('plist');pl.innerHTML='';
    for(var i=0;i<players.length;i++){var p=players[i];
      var row=document.createElement('div');row.className='pc';
      var av=document.createElement('div');av.className='pa';av.style.background=p.col;av.textContent=p.name.charAt(0);
      var nm=document.createElement('span');nm.className='pname'+(p.isYou?' me':'');nm.textContent=p.name+(p.isYou?' (you)':'');
      var st=document.createElement('span');
      if(gameState==='active'&&(p.roundBet||0)>0){
        if(p.cashedOut){st.className='pstat out';st.textContent=(p.cashOutMultiplier||multiplier).toFixed(1)+'x';}
        else{st.className='pstat active';st.textContent=p.roundBet+'p';}
      }else{st.className='pstat wait';st.textContent='\u2014';}
      row.appendChild(av);row.appendChild(nm);row.appendChild(st);pl.appendChild(row);
    }
    for(var i=players.length;i<6;i++){var es=document.createElement('div');es.className='es';es.textContent='Waiting...';pl.appendChild(es);}
    lastPH=pKey;
  }

  // Buttons
  var dbtn=document.getElementById('dbtn');
  var isActive=gameState==='active';
  dbtn.disabled=!connected||!isActive||!myP||myP.bal<1||(myP.cashedOut===true);
  dbtn.textContent=!connected?'CONNECTING':gameState==='countdown'?'STARTING...':gameState==='collapsing'?'COLLAPSING':!isActive?'WAITING':'DROP 1p';

  var cbtn=document.getElementById('cbtn');
  var canCash=isActive&&myP&&!myP.cashedOut&&(myP.roundBet||0)>0;
  cbtn.disabled=!canCash;
  if(canCash){var potWin=((myP.roundBet||0)*multiplier*(1-0.015)).toFixed(1);cbtn.innerHTML='CASH OUT <span class="amt">'+potWin+'p</span>';}
  else if(myP&&myP.cashedOut){cbtn.textContent='CASHED OUT';}
  else{cbtn.textContent='CASH OUT';}
}

function addLog(msg,cls){var el=document.getElementById('log'),d=document.createElement('div');d.className=cls||'';d.textContent='['+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+'] '+msg;el.prepend(d);while(el.children.length>100)el.removeChild(el.lastChild);}

// ===== INPUT =====
// Cursor aiming via mouse/touch
gc.addEventListener('mousemove',function(e){
  var rect=gc.getBoundingClientRect();var rx=(e.clientX-rect.left)/rect.width;
  cursorOx=((rx-.5)*2)*MAX_OX; // -MAX_OX to +MAX_OX
  cursorOx=Math.max(-MAX_OX,Math.min(MAX_OX,cursorOx));
});
gc.addEventListener('click',function(e){myDrop();});
gc.addEventListener('touchstart',function(e){e.preventDefault();isDragging=true;
  var t=e.touches[0],rect=gc.getBoundingClientRect();cursorOx=((t.clientX-rect.left)/rect.width-.5)*2*MAX_OX;
},{passive:false});
gc.addEventListener('touchmove',function(e){e.preventDefault();if(!isDragging)return;
  var t=e.touches[0],rect=gc.getBoundingClientRect();cursorOx=((t.clientX-rect.left)/rect.width-.5)*2*MAX_OX;
  cursorOx=Math.max(-MAX_OX,Math.min(MAX_OX,cursorOx));
},{passive:false});
gc.addEventListener('touchend',function(e){if(isDragging){isDragging=false;myDrop();}});

document.getElementById('dbtn').addEventListener('click',function(){myDrop();});
document.getElementById('cbtn').addEventListener('click',function(){myCashOut();});
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault();myDrop();}
  if(e.code==='KeyC'){myCashOut();}
});

// Emoji bar
document.getElementById('ebar').addEventListener('click',function(e){
  var btn=e.target.closest('.emoji-btn');if(btn)sendEmoji(btn.dataset.id);
});

updUI();loop();connect();
})();
</script>
